<svg width="400" height="180" viewBox="0 0 400 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="University of Cambridge">
  <!-- 校徽圆形徽章 -->
  <g transform="translate(80, 90)">
    <!-- 外圈圆环 -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#D71920" stroke-width="3"/>
    
    <!-- 外圈文字 -->
    <text x="0" y="-45" text-anchor="middle" font-family="Times New Roman, serif" font-size="6.5" font-weight="bold" fill="#D71920">UNIVERSITAS</text>
    <text x="0" y="52" text-anchor="middle" font-family="Times New Roman, serif" font-size="6.5" font-weight="bold" fill="#D71920">CANTABRIGIENSIS</text>
    
    <!-- 装饰点 -->
    <circle cx="-45" cy="-15" r="2" fill="#D71920"/>
    <circle cx="0" cy="-48" r="2" fill="#D71920"/>
    <circle cx="45" cy="-15" r="2" fill="#D71920"/>
    <circle cx="45" cy="15" r="2" fill="#D71920"/>
    <circle cx="0" cy="48" r="2" fill="#D71920"/>
    <circle cx="-45" cy="15" r="2" fill="#D71920"/>
    
    <!-- 狮子头部 -->
    <ellipse cx="0" cy="-12" rx="18" ry="14" fill="#D71920"/>
    <circle cx="-8" cy="-16" r="3" fill="#FDBF6F"/>
    <circle cx="8" cy="-16" r="3" fill="#FDBF6F"/>
    <ellipse cx="0" cy="-8" rx="6" ry="4" fill="#FDBF6F"/>
    <path d="M-10 -2 L0 2 L10 -2" fill="none" stroke="#000" stroke-width="1.5"/>
    
    <!-- 狮子鬃毛 -->
    <path d="M-18 -14 L-22 -20 L-16 -18" stroke="#D71920" stroke-width="2" fill="#D71920"/>
    <path d="M-15 -20 L-18 -26 L-10 -22" stroke="#D71920" stroke-width="2" fill="#D71920"/>
    <path d="M0 -22 L0 -28 L0 -22" stroke="#D71920" stroke-width="2" fill="#D71920"/>
    <path d="M15 -20 L18 -26 L10 -22" stroke="#D71920" stroke-width="2" fill="#D71920"/>
    <path d="M18 -14 L22 -20 L16 -18" stroke="#D71920" stroke-width="2" fill="#D71920"/>
    
    <!-- 打开的书本 -->
    <rect x="-20" y="8" width="40" height="18" fill="#FDBF6F" stroke="#D71920" stroke-width="2" rx="1"/>
    <path d="M0 8 L0 26" stroke="#D71920" stroke-width="2"/>
    
    <!-- 书本文字 -->
    <text x="-8" y="20" font-family="Times New Roman, serif" font-size="4.5" font-weight="bold" fill="#D71920">VER</text>
    <text x="5" y="20" font-family="Times New Roman, serif" font-size="4.5" font-weight="bold" fill="#D71920">VTAS</text>
    
    <!-- 底部装饰 -->
    <path d="M-22 32 L-22 40 L22 40 L22 32" fill="none" stroke="#D71920" stroke-width="2"/>
    <path d="M-18 40 L0 50 L18 40" fill="none" stroke="#D71920" stroke-width="2"/>
    <path d="M-10 50 L0 58 L10 50" fill="none" stroke="#D71920" stroke-width="2"/>
  </g>
  
  <!-- 右侧英文名称 -->
  <text x="220" y="65" font-family="Times New Roman, serif" font-size="14" font-weight="bold" fill="#D71920" letter-spacing="4">UNIVERSITY OF</text>
  <text x="200" y="105" font-family="Times New Roman, serif" font-size="36" font-weight="bold" fill="#D71920" letter-spacing="2">CAMBRIDGE</text>
</svg>
